<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>My Video</title>
  <style>
    body { 
      background: black; 
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .video-container {
      width: 100%;
      max-width: 900px;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
    }

</head>
<body>

<div class="video-container">
  <iframe 
    src="https://www.youtube.com/embed/1AWx0fwL8uY?autoplay=1&mute=1&rel=0&modestbranding=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
